name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  node-tests-build:
    name: Node CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-handler
          - service: notifier-service
          - service: web-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test -- --runInBand

      - name: Build
        working-directory: ${{ matrix.service }}
        run: npm run build

  python-check:
    name: Python CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gnews-service
          - service: scraping-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Validate syntax
        working-directory: ${{ matrix.service }}
        run: python -m py_compile src/main.py

  e2e-mvp:
    name: E2E MVP Gate
    runs-on: ubuntu-latest
    needs: [node-tests-build, python-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run MVP E2E
        run: bash scripts/e2e-mvp.sh

  docker-publish:
    name: Docker CD (${{ matrix.image }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [node-tests-build, python-check, e2e-mvp]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api-handler
            context: ./api-handler
            dockerfile: ./api-handler/Dockerfile
          - image: notifier-service
            context: ./notifier-service
            dockerfile: ./notifier-service/Dockerfile
          - image: web-app
            context: ./web-app
            dockerfile: ./web-app/Dockerfile
          - image: gnews-service
            context: ./gnews-service
            dockerfile: ./gnews-service/Dockerfile
          - image: scraping-worker
            context: ./scraping-worker
            dockerfile: ./scraping-worker/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/market-watcher-${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/market-watcher-${{ matrix.image }}:${{ github.sha }}
